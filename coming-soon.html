<!DOCTYPE html>
<html lang="en" class="light scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon - Compass Housing</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#1A56DB", secondary: "#0F172A" },
          fontFamily: { sans: ["Inter", "sans-serif"] },
        },
      },
      darkMode: "class",
    };
  </script>

  <style>
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      margin: auto;
      background-image: url("Images/transparent-logo-1.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 600px auto;
      opacity: 0.10;
      pointer-events: none;
      z-index: -1;
    }
  </style>

  <style>
    /* Global Button */
    .btn-primary {
      @apply px-6 py-3 bg-primary text-white font-semibold rounded-lg hover:bg-primary/90 transition;
    }
  </style>
</head>

<body data-page="comingsoon" class="bg-white dark:bg-gray-900 text-secondary dark:text-white" style="padding-top: 1rem;">

  <!-- Theme Toggle -->
  <button id="themeToggle"
    class="fixed bottom-5 right-5 z-[999] p-3 rounded-full bg-primary text-white shadow-lg hover:bg-secondary transition">
    🌓
  </button>

  <!-- HEADER -->
  <div id="site-header"></div>
  <script src="header.js"></script>

  <!-- PAGE CONTENT -->
  <div class="relative min-h-screen flex flex-col items-center justify-center text-center px-6 py-20">

    <!-- Logo -->
    <a href="index.html" class="flex items-center gap-2 mb-6">
      <img src="Images/colored-logo.png" class="w-12 h-12" />
      <span class="text-3xl font-bold">Compass Housing</span>
    </a>

    <!-- Title -->
    <h1 class="text-4xl md:text-6xl font-extrabold mb-4">Coming Soon</h1>

    <p class="text-gray-600 dark:text-gray-300 text-lg md:text-xl max-w-xl mb-10">
      We’re working hard to bring you something amazing. Stay tuned!
    </p>

    <!-- COUNTDOWN -->
    <div id="countdown" class="flex gap-6 md:gap-12 text-center mb-12">

      <div>
        <h2 id="days" class="text-4xl font-bold">00</h2>
        <p class="text-sm mt-1">Days</p>
      </div>

      <div>
        <h2 id="hours" class="text-4xl font-bold">00</h2>
        <p class="text-sm mt-1">Hours</p>
      </div>

      <div>
        <h2 id="minutes" class="text-4xl font-bold">00</h2>
        <p class="text-sm mt-1">Minutes</p>
      </div>

      <div>
        <h2 id="seconds" class="text-4xl font-bold">00</h2>
        <p class="text-sm mt-1">Seconds</p>
      </div>

    </div>

    <!-- EMAIL SUBSCRIBE -->
    <div class="flex flex-col sm:flex-row items-center gap-2 w-full max-w-md">
      <!-- <input id="notifyEmail" type="email" placeholder="Enter your email"
        class="px-4 py-3 w-full rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 outline-none border border-gray-300 dark:border-gray-700" /> -->

  <input
          type="email"
          placeholder="Your Email"
          class="px-4 py-3 w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-secondary dark:text-white focus:ring-2 focus:ring-primary outline-none"
        />
 <button
  id="notifyBtn"
  class="px-4 py-3 bg-primary text-white font-semibold rounded-lg hover:bg-primary/90 whitespace-nowrap"
>
  Notify Me
</button>
    </div>

    <p id="notifyError" class="text-red-500 text-sm mt-2 hidden">Please enter a valid email.</p>
    <p id="notifySuccess" class="text-green-500 text-sm mt-2 hidden">You will be notified!</p>

  </div>

  <!-- FOOTER -->
 <div id="site-footer" class="px-4 md:px-8"></div>
  <script type="module" src="footer.js"></script>

  <!-- COUNTDOWN SCRIPT -->
  <script>
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 7);

    function updateCountdown() {
      const now = new Date().getTime();
      const dist = targetDate - now;

      if (dist <= 0) return;

      document.getElementById("days").innerText =
        Math.floor(dist / (1000 * 60 * 60 * 24));

      document.getElementById("hours").innerText =
        Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

      document.getElementById("minutes").innerText =
        Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));

      document.getElementById("seconds").innerText =
        Math.floor((dist % (1000 * 60)) / 1000);
    }
    setInterval(updateCountdown, 1000);
  </script>

  <!-- NOTIFY ME VALIDATION -->
  <script>
    const emailInput = document.getElementById("notifyEmail");
    const btn = document.getElementById("notifyBtn");
    const errorMsg = document.getElementById("notifyError");
    const successMsg = document.getElementById("notifySuccess");

    btn.addEventListener("click", () => {
      errorMsg.classList.add("hidden");
      successMsg.classList.add("hidden");

      const email = emailInput.value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRegex.test(email)) {
        errorMsg.classList.remove("hidden");
        emailInput.classList.add("border-red-500");
        return;
      }

      emailInput.classList.remove("border-red-500");
      successMsg.classList.remove("hidden");
      emailInput.value = "";
    });
  </script>

  <!-- THEME TOGGLE -->
  <script>
    document.getElementById("themeToggle").onclick = () =>
      document.documentElement.classList.toggle("dark");
  </script>

</body>

</html>
